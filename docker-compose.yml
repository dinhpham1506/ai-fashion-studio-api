name: ai-fashion-studio

# Brings in postgres, kafka, minio, pgadmin, kafka-ui from infra/.
# Run everything locally with:  docker compose up --build
# Entry point for frontends = api-gateway (host port 8080).
include:
  - infra/docker-compose.yml

services:
  api-gateway:
    build: ./backend/api-gateway
    container_name: ai-fashion-studio-api-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      SVC_JAVA_URI: http://java-core-api:8080
      SVC_DOTNET_URI: http://dotnet-platform-api:8080
    depends_on:
      - java-core-api
      - dotnet-platform-api

  java-core-api:
    build: ./backend/java-core-api
    container_name: ai-fashion-studio-java-core-api
    restart: unless-stopped
    ports:
      - "${JAVA_API_PORT:-8081}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      STORAGE_S3_PUBLIC_BASE_URL: "${MINIO_PUBLIC_BASE_URL:-http://localhost:19000}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  dotnet-platform-api:
    build: ./backend/dotnet-platform-api
    container_name: ai-fashion-studio-dotnet-platform-api
    restart: unless-stopped
    ports:
      - "${DOTNET_API_PORT:-8082}:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:?POSTGRES_DB is required};Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      Kafka__BootstrapServers: "kafka:9092"
      JavaCoreApi__BaseUrl: "http://java-core-api:8080"
      JavaCoreApi__TimeoutSeconds: "10"
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      Minio__SecretKey: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      Minio__PublicBaseUrl: "${MINIO_PUBLIC_BASE_URL:-http://localhost:19000}"
      Minio__UseSSL: "false"
      # PayOS / SePay (điền tay vào .env, không commit secret)
      PayOS__ClientId: "${PAYOS_CLIENT_ID:-}"
      PayOS__ApiKey: "${PAYOS_API_KEY:-}"
      PayOS__ChecksumKey: "${PAYOS_CHECKSUM_KEY:-}"
      PayOS__ReturnUrl: "${PAYOS_RETURN_URL:-http://localhost:5173/payment/success}"
      PayOS__CancelUrl: "${PAYOS_CANCEL_URL:-http://localhost:5173/payment/cancel}"
      # SMTP / Gmail app password (điền tay vào .env, không commit secret)
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL:-${SMTP_USERNAME:-}}"
      # Gemini (LLM free tier - AI Chat) - điền tay vào .env, không commit secret
      Gemini__ApiKey: "${GEMINI_API_KEY:-}"
      Gemini__Model: "${GEMINI_MODEL:-gemini-2.5-flash}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
