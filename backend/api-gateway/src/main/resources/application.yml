server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Local defaults to localhost ports; docker-compose overrides SVC_*_URI to service names.
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowed-methods: "*"
            allowed-headers: "*"
      routes:
        # ---- C# dotnet-platform-api ----
        - id: identity
          uri: ${SVC_DOTNET_URI:http://localhost:8082}
          predicates:
            - Path=/api/auth/**,/api/users/**,/api/roles/**
        - id: payment
          uri: ${SVC_DOTNET_URI:http://localhost:8082}
          predicates:
            - Path=/api/payments/**,/api/invoices/**
        - id: content
          uri: ${SVC_DOTNET_URI:http://localhost:8082}
          predicates:
            - Path=/api/about-us/**
        # ---- Java java-core-api ----
        - id: catalog
          uri: ${SVC_JAVA_URI:http://localhost:8081}
          predicates:
            - Path=/api/products/**,/api/variants/**,/api/inventory/**
        - id: design-tryon
          uri: ${SVC_JAVA_URI:http://localhost:8081}
          predicates:
            - Path=/api/designs/**,/api/tryon/**
        - id: ordering
          uri: ${SVC_JAVA_URI:http://localhost:8081}
          predicates:
            - Path=/api/orders/**
        - id: feedback
          uri: ${SVC_JAVA_URI:http://localhost:8081}
          predicates:
            - Path=/api/feedbacks/**

# TODO (bạn tự làm): thêm GlobalFilter verify JWT (ký bởi C# Identity) + role guard trước khi route.

management:
  endpoints:
    web:
      exposure:
        include: health,info
