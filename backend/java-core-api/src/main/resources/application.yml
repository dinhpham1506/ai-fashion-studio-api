server:
  port: 8080

spring:
  application:
    name: java-core-api
  datasource:
    # Local run defaults to localhost; docker-compose overrides via env (host = "postgres")
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_fashion_studio_db}
    username: ${SPRING_DATASOURCE_USERNAME:aifashionstudio}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      # Tables are created by infra/postgres/init scripts (or Flyway later). App must NOT manage schema.
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  kafka:
    # Local run uses host-facing listener (29092); docker-compose overrides to "kafka:9092"
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: java-core-api
      auto-offset-reset: earliest

storage:
  s3:
    # Internal endpoint (container network); docker-compose overrides host to "minio"
    endpoint: ${STORAGE_S3_ENDPOINT:http://localhost:19000}
    access-key: ${STORAGE_S3_ACCESS_KEY:admin}
    secret-key: ${STORAGE_S3_SECRET_KEY:admin_db@@}
    # Browser-facing URL used to build public links to uploaded objects (may differ from endpoint above)
    public-base-url: ${STORAGE_S3_PUBLIC_BASE_URL:http://localhost:19000}

design:
  image-generation:
    # Free, no-API-key text-to-image endpoint (Pollinations.ai)
    base-url: ${DESIGN_IMAGE_GEN_BASE_URL:https://image.pollinations.ai/prompt/}
    width: ${DESIGN_IMAGE_GEN_WIDTH:768}
    height: ${DESIGN_IMAGE_GEN_HEIGHT:768}
    timeout-seconds: ${DESIGN_IMAGE_GEN_TIMEOUT_SECONDS:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
